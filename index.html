<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Motor 3D - Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* VARIABLES ESTILO TERMINAL */
    :root {
      --bg-color: #050505;
      --panel-bg: #0a0a0a;
      --primary: #00ff00;
      --primary-dark: #005500;
      --text-main: #00ff00;
      --text-muted: #00aa00;
      --border-color: #00ff00;
      --canvas-bg: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Consolas', 'Courier New', Courier, monospace;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* CONTENEDOR PRINCIPAL */
    .terminal-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* PANEL SUPERIOR (CONTROLES) */
    .top-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: flex-start;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 10px;
      gap: 15px;
      z-index: 10;
      max-height: 40vh;
      overflow-y: auto;
    }

    /* SECCIONES DEL PANEL */
    .panel-section {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
      padding: 10px;
      min-width: 200px;
      flex: 1 1 200px;
      background: rgba(0, 255, 0, 0.05);
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 5px;
    }

    /* CONTROLES TIPO TERMINAL */
    .control-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .control-row label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: var(--border-color);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px;
      width: 6px;
      background: var(--bg-color);
      border: 1px solid var(--primary);
      margin-top: -5px;
      cursor: pointer;
    }

    .val-display {
      font-size: 0.75rem;
      color: var(--primary);
      text-align: right;
      margin-top: 2px;
    }

    /* BOTONES */
    .term-btn {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s;
      width: 100%;
      text-align: center;
    }
    .term-btn:hover {
      background: var(--primary);
      color: var(--bg-color);
    }
    .term-btn:active {
      transform: scale(0.98);
    }

    .file-input-wrapper {
      margin-bottom: 5px;
    }

    /* DPAD */
    .dpad-container {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(3, 40px);
      gap: 2px;
      justify-content: center;
      align-items: center;
      margin-top: 5px;
    }
    .dpad-btn {
      width: 100%;
      height: 100%;
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-size: 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .dpad-btn:hover {
      background: var(--primary-dark);
    }
    .dpad-btn:active {
      background: var(--primary);
      color: var(--bg-color);
    }
    .dpad-up { grid-column: 2; grid-row: 1; }
    .dpad-left { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down { grid-column: 2; grid-row: 3; }

    /* CANVAS CONTENEDOR */
    .canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--canvas-bg);
      position: relative;
      overflow: hidden;
      /* Grid sutil */
      background-image: 
        linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    canvas {
      border: 1px solid var(--border-color);
      max-width: 100%;
      max-height: 100%;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); border-left: 1px solid var(--primary-dark); }
    ::-webkit-scrollbar-thumb { background: var(--primary); }

    @media (max-width: 768px) {
      .top-panel {
        max-height: 50vh;
        padding: 5px;
        gap: 5px;
      }
      .panel-section {
        min-width: 140px;
        padding: 5px;
      }
      .dpad-container {
        grid-template-columns: repeat(3, 30px);
        grid-template-rows: repeat(3, 30px);
      }
    }
  </style>
</head>
<body>

  <div class="terminal-container">
    
    <!-- PANEL SUPERIOR -->
    <div class="top-panel">
      
      <!-- Carga de Archivos -->
      <div class="panel-section">
        <div class="section-title">I/O DATOS</div>
        <div class="file-input-wrapper">
          <label for="file-input-base" class="term-btn">[ CARGAR BASE ]</label>
          <input type="file" id="file-input-base" accept=".txt,.dat,.obj" style="display: none;" />
        </div>
        <div id="file-name-base" style="font-size:0.6rem; color:var(--text-muted); text-align:center; margin-bottom:10px;">> NULL</div>
        
        <div class="file-input-wrapper">
          <label for="file-input-movil" class="term-btn">[ ENSAMBLAR OBJ ]</label>
          <input type="file" id="file-input-movil" accept=".txt,.dat,.obj" style="display: none;" />
        </div>
        <div id="file-name-movil" style="font-size:0.6rem; color:var(--text-muted); text-align:center;">> NULL</div>
      </div>

      <!-- Cámara y Cinemática -->
      <div class="panel-section">
         <div class="section-title">SISTEMA VISUAL</div>
         <div class="control-row">
           <label>Z-INDEX (ZOOM)</label>
           <input type="range" id="cam-zoom" min="1" max="10" step="0.5" value="3.5">
           <span class="val-display" id="val-cam-zoom">3.5</span>
         </div>
         <button class="term-btn" id="btn-assemble" style="margin-top: 5px;">[ EXE AUTO-ENSAMBLAR ]</button>
      </div>

      <!-- Iluminacion y Sombras -->
      <div class="panel-section">
         <div class="section-title">RENDERIZADO</div>
         <div class="control-row">
           <label>VECTOR LUZ X</label>
           <input type="range" id="light-dir-x" min="-1" max="1" step="0.1" value="-0.5">
           <span class="val-display" id="val-light-dir-x">-0.5</span>
         </div>
         <div class="control-row">
           <label>EXPOSICIÓN</label>
           <input type="range" id="light-bright" min="-2" max="1" step="0.1" value="-1">
           <span class="val-display" id="val-light-bright">-1.0</span>
         </div>
         <div class="control-row">
           <label>CONSTANTE SOMBRA</label>
           <input type="range" id="light-shadow" min="0.1" max="5" step="0.1" value="2">
           <span class="val-display" id="val-light-shadow">2.0</span>
         </div>
      </div>

      <!-- Controles: Animar y Rotación -->
      <div class="panel-section" style="align-items: center;">
        <div class="section-title" style="width: 100%;">CONTROL GIMBAL</div>
        <button class="term-btn" id="btn-auto-rotate" style="margin-bottom: 5px; width: 100%;">[ ANIMAR MATRIZ ]</button>

        <div class="dpad-container">
          <div class="dpad-btn dpad-up" id="btn-rot-up">&#9650;</div>
          <div class="dpad-btn dpad-left" id="btn-rot-left">&#9664;</div>
          <div class="dpad-btn dpad-right" id="btn-rot-right">&#9654;</div>
          <div class="dpad-btn dpad-down" id="btn-rot-down">&#9660;</div>
        </div>
      </div>

    </div>

    <!-- ZONA GRÁFICA (Canvas) -->
    <main class="canvas-container" id="canvas-container">
      <canvas id="circlechart" width="800" height="600"></canvas>
    </main>

  </div>

  <script src="dist/src/index.js" type="module"></script>
</body>
</html>
